services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: todoflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/xiaqijun/todoflow-server:latest
    ports:
      - "${PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-change-me}@db:5432/todoflow
      PORT: "3001"
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./server/downloads:/app/downloads

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup server
    restart: unless-stopped

volumes:
  pgdata:
