services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: todoflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "${PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-change-me}@db:5432/todoflow
      JWT_SECRET: ${JWT_SECRET:-change-me-to-random}
      PORT: "3001"
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./server/downloads:/app/downloads
    command: >
      sh -c "npx prisma migrate deploy && node dist/index.js"

volumes:
  pgdata:
