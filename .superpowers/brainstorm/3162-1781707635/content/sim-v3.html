<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TodoFlow 模拟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: #c9d1d9; user-select: none;
  }
  .desktop {
    width: 100%; max-width: 900px; aspect-ratio: 16/10;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-radius: 16px; position: relative; overflow: hidden;
    box-shadow: 0 0 0 1px #30363d;
  }
  .taskbar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 36px;
    background: rgba(22,27,34,0.9); backdrop-filter: blur(12px);
    border-top: 1px solid #30363d;
    display: flex; align-items: center; padding: 0 12px;
  }
  .taskbar-time { margin-left: auto; font-size: 11px; color: #8b949e; }
  .tray { position: absolute; bottom: 40px; right: 10px; display: flex; gap: 6px; }
  .tray-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; opacity: 0.7; }
  .tray-icon:hover { opacity: 1; }

  .float-win {
    position: absolute; top: 8px; right: 8px;
    width: 310px; max-height: calc(100% - 52px);
    background: #161b22; border: 1px solid #30363d;
    border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex; flex-direction: column; overflow: hidden; z-index: 100; font-size: 12px;
  }
  .win-header {
    padding: 8px 10px; display: flex; align-items: center; gap: 6px;
    border-bottom: 1px solid #21262d; flex-shrink: 0;
  }
  .win-title { font-weight: 600; font-size: 12px; flex: 1; }
  .win-pin { cursor: pointer; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #21262d; border: 1px solid #30363d; color: #8b949e; line-height: 1; }
  .win-pin:hover { color: #f0f6fc; }
  .win-tabs { display: flex; gap: 1px; background: #21262d; border-radius: 4px; padding: 1px; }
  .win-tab { padding: 3px 8px; border-radius: 3px; font-size: 10px; cursor: pointer; color: #8b949e; border: none; background: none; white-space: nowrap; }
  .win-tab.active { background: #30363d; color: #f0f6fc; }
  .win-body { flex: 1; overflow-y: auto; padding: 4px 8px 2px; min-height: 0; }

  .quad-section { margin-bottom: 0; }
  .quad-header { display: flex; align-items: center; gap: 5px; padding: 6px 4px; font-size: 10px; font-weight: 600; cursor: pointer; position: sticky; top: 0; background: #161b22; z-index: 2; border-radius: 4px; }
  .quad-header:hover { background: #1c2128; }
  .quad-dot { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; }
  .quad-count { margin-left: auto; font-size: 9px; color: #8b949e; }
  .quad-arrow { font-size: 8px; color: #484f58; transition: transform .15s; display: inline-block; width: 10px; text-align: center; }
  .quad-collapsed .quad-tasks { display: none; }
  .quad-collapsed .quad-arrow { transform: rotate(-90deg); }

  .task-item { display: flex; align-items: center; gap: 5px; padding: 4px 6px; border-radius: 5px; margin-bottom: 1px; font-size: 11px; }
  .task-item:hover { background: #1c2128; }
  .task-item.done .task-title { text-decoration: line-through; color: #484f58; opacity: 0.5; }
  .task-check { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #30363d; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 8px; }
  .task-check:hover { border-color: #58a6ff; }
  .task-check.checked { background: #238636; border-color: #238636; color: #fff; }
  .task-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-tag { font-size: 8px; padding: 1px 5px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; line-height: 1.4; }
  .tag-recur { background: rgba(203,166,247,0.15); color: #cba6f7; }
  .tag-assign { background: rgba(88,166,255,0.12); color: #58a6ff; }
  .tag-new { background: rgba(248,81,73,0.15); color: #f85149; }
  .subtasks { margin-left: 14px; }

  .win-addbar { padding: 4px 8px 8px; border-top: 1px solid #21262d; flex-shrink: 0; }
  .add-row { display: flex; gap: 4px; }
  .add-input { flex: 1; background: #21262d; border: 1px solid #30363d; padding: 6px 10px; border-radius: 6px; color: #c9d1d9; font-size: 11px; outline: none; }
  .add-input:focus { border-color: #58a6ff; }
  .add-input::placeholder { color: #484f58; }
  .add-btn { padding: 6px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; border: none; font-weight: 500; background: #238636; color: #fff; white-space: nowrap; }
  .add-btn:hover { background: #2ea043; }

  .add-form { display: none; margin-top: 6px; background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 10px; }
  .add-form.open { display: block; }
  .form-row { display: flex; gap: 4px; margin-bottom: 5px; }
  .form-row.tight { gap: 3px; }
  .form-field { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .form-label { font-size: 9px; color: #8b949e; text-transform: uppercase; }
  .form-input, .form-select { background: #21262d; border: 1px solid #30363d; padding: 5px 8px; border-radius: 5px; color: #c9d1d9; font-size: 11px; outline: none; width: 100%; }
  .form-input:focus, .form-select:focus { border-color: #58a6ff; }
  .form-actions { display: flex; gap: 4px; justify-content: flex-end; margin-top: 8px; }
  .btn { padding: 5px 12px; border-radius: 5px; font-size: 11px; cursor: pointer; border: none; }
  .btn-cancel { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
  .btn-cancel:hover { background: #30363d; }
  .btn-primary { background: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }
  .subtask-inline { display: flex; align-items: center; gap: 4px; margin: 3px 0; }
  .subtask-remove { color: #484f58; cursor: pointer; font-size: 12px; }
  .subtask-remove:hover { color: #f85149; }
</style>
</head>
<body>
<div class="desktop" id="desktop">
  <div class="tray"><div class="tray-icon" title="TodoFlow">📋</div></div>

  <div class="float-win" id="floatWin">
    <div class="win-header">
      <span class="win-title">📋 TodoFlow</span>
      <div class="win-tabs">
        <button class="win-tab active" onclick="switchTab(this)">我的</button>
        <button class="win-tab" onclick="switchTab(this)">💻开发组</button>
      </div>
      <span class="win-pin">📌</span>
    </div>

    <div class="win-body">
      <div class="quad-section" id="q1section">
        <div class="quad-header" onclick="toggleQuad(this)">
          <span class="quad-arrow">▼</span><span class="quad-dot" style="background:#f85149;"></span>
          <span style="color:#f85149;">马上做</span><span class="quad-count">2</span>
        </div>
        <div class="quad-tasks">
          <div class="task-item">
            <div class="task-check" onclick="this.classList.toggle('checked');this.parentElement.classList.toggle('done')"></div>
            <span class="task-title">🔄 巡检</span>
            <span class="task-tag tag-recur">每小时</span>
          </div>
          <div class="task-item">
            <div class="task-check" onclick="this.classList.toggle('checked');this.parentElement.classList.toggle('done')"></div>
            <span class="task-title">🔥 紧急排查故障</span>
            <span class="task-tag tag-new">新</span>
          </div>
        </div>
      </div>

      <div class="quad-section" id="q2section">
        <div class="quad-header" onclick="toggleQuad(this)">
          <span class="quad-arrow">▼</span><span class="quad-dot" style="background:#d29922;"></span>
          <span style="color:#d29922;">计划做</span><span class="quad-count">3</span>
        </div>
        <div class="quad-tasks">
          <div class="task-item"><div class="task-check"></div><span class="task-title">📝 周报</span><span class="task-tag tag-recur">每周一</span></div>
          <div class="task-item"><div class="task-check"></div><span class="task-title">📄 日报</span><span class="task-tag tag-recur">18:00后</span></div>
          <div class="task-item"><div class="task-check"></div><span class="task-title">🛡 暴露面梳理</span><span class="task-tag tag-recur">每季</span></div>
          <div class="subtasks">
            <div class="task-item"><div class="task-check"></div><span class="task-title">收集资产清单</span><span class="task-tag tag-assign">@张三</span></div>
            <div class="task-item"><div class="task-check checked"></div><span class="task-title" style="text-decoration:line-through;color:#484f58;">扫描端口</span><span class="task-tag tag-assign">@李四</span></div>
            <div class="task-item"><div class="task-check"></div><span class="task-title">汇总报告</span><span class="task-tag tag-assign">@张三</span></div>
          </div>
        </div>
      </div>

      <div class="quad-section quad-collapsed" id="q3section">
        <div class="quad-header" onclick="toggleQuad(this)">
          <span class="quad-arrow">▼</span><span class="quad-dot" style="background:#58a6ff;"></span>
          <span style="color:#58a6ff;">委派</span><span class="quad-count">1</span>
        </div>
        <div class="quad-tasks">
          <div class="task-item"><div class="task-check"></div><span class="task-title">打印材料</span><span class="task-tag tag-assign">@王五</span></div>
        </div>
      </div>

      <div class="quad-section quad-collapsed" id="q4section">
        <div class="quad-header" onclick="toggleQuad(this)">
          <span class="quad-arrow">▼</span><span class="quad-dot" style="background:#484f58;"></span>
          <span style="color:#484f58;">暂缓</span><span class="quad-count">1</span>
        </div>
        <div class="quad-tasks">
          <div class="task-item"><div class="task-check"></div><span class="task-title">整理文档</span></div>
        </div>
      </div>
    </div>

    <div class="win-addbar">
      <div class="add-row">
        <input class="add-input" placeholder="+ 添加..." id="quickAdd">
        <button class="add-btn" onclick="toggleForm()">添加</button>
      </div>
      <div class="add-form" id="addForm">
        <div class="form-row">
          <div class="form-field" style="flex:2">
            <label class="form-label">标题</label>
            <input class="form-input" placeholder="任务名称" id="taskTitle">
          </div>
          <div class="form-field">
            <label class="form-label">象限</label>
            <select class="form-select" id="quadrant">
              <option value="q1">🔴 马上做</option>
              <option value="q2" selected>🟡 计划做</option>
              <option value="q3">🔵 委派</option>
              <option value="q4">⚫ 暂缓</option>
            </select>
          </div>
        </div>
        <!-- 开始时间 + 截止时间 -->
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">开始时间</label>
            <input class="form-input" type="datetime-local" id="startTime" value="2026-06-17T09:00">
          </div>
          <div class="form-field">
            <label class="form-label">截止时间</label>
            <input class="form-input" type="datetime-local" id="dueTime" value="2026-06-17T18:00">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">分配给</label>
            <select class="form-select">
              <option>自己</option><option>张三</option><option>李四</option><option>王五</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">循环</label>
            <select class="form-select" id="recurrence" onchange="updateRecurExtra()">
              <option>不循环</option><option>每小时</option><option>每天</option><option>每周</option><option>每月</option><option>每季度</option>
            </select>
          </div>
        </div>
        <!-- 循环额外设置 -->
        <div id="recurExtra" style="display:none;">
          <div class="form-row tight">
            <div class="form-field">
              <label class="form-label" id="recurLabel1">开始</label>
              <input class="form-input" type="time" value="09:00" id="recurVal1" style="font-size:10px;padding:5px 4px;">
            </div>
            <div class="form-field">
              <label class="form-label" id="recurLabel2">截止</label>
              <input class="form-input" type="time" value="18:00" id="recurVal2" style="font-size:10px;padding:5px 4px;">
            </div>
          </div>
          <div class="form-row tight" id="recurField3" style="display:none;">
            <div class="form-field" style="flex:0 0 80px;">
              <label class="form-label" id="recurLabel3">间隔(小时)</label>
              <input class="form-input" type="number" value="1" min="1" max="24" id="recurVal3" style="font-size:10px;padding:5px 6px;">
            </div>
          </div>
        </div>
        <!-- 子任务 -->
        <div style="margin-top:2px;">
          <label class="form-label">子任务</label>
          <div id="subtaskList">
            <div class="subtask-inline">
              <input class="form-input" placeholder="名称" style="flex:1;font-size:10px;">
              <select class="form-select" style="width:66px;font-size:10px;">
                <option>自己</option><option>张三</option><option>李四</option><option>王五</option>
              </select>
              <span class="subtask-remove" onclick="this.parentElement.remove()">✕</span>
            </div>
          </div>
          <span style="font-size:9px;color:#58a6ff;cursor:pointer;margin-top:3px;display:inline-block;" onclick="addSubtask()">+ 子任务</span>
        </div>
        <div class="form-actions">
          <button class="btn btn-cancel" onclick="toggleForm()">取消</button>
          <button class="btn btn-primary" onclick="addTask()">添加</button>
        </div>
      </div>
    </div>
  </div>

  <div class="taskbar"><span class="taskbar-time" id="clock">15:42</span></div>
</div>

<script>
function toggleQuad(h) { h.closest('.quad-section').classList.toggle('quad-collapsed'); }
function switchTab(el) { document.querySelectorAll('.win-tab').forEach(t=>t.classList.remove('active')); el.classList.add('active'); }

function toggleForm() {
  const f = document.getElementById('addForm');
  f.classList.toggle('open');
  if (!f.classList.contains('open')) {
    document.getElementById('quickAdd').value = '';
    document.getElementById('taskTitle').value = '';
  }
  if (f.classList.contains('open')) document.getElementById('taskTitle').focus();
}

function updateRecurExtra() {
  const v = document.getElementById('recurrence').value;
  const e = document.getElementById('recurExtra');
  const f3 = document.getElementById('recurField3');
  if (v === '不循环') { e.style.display = 'none'; return; }
  e.style.display = '';
  const l1 = document.getElementById('recurLabel1');
  const l2 = document.getElementById('recurLabel2');
  f3.style.display = 'none';
  if (v==='每小时') {
    l1.textContent='开始时间'; l2.textContent='截止时间';
    f3.style.display = '';
    document.getElementById('recurLabel3').textContent='间隔(小时)';
  } else if (v==='每天') {
    l1.textContent='显示时间'; l2.textContent='截止时间';
  } else if (v==='每周') {
    l1.textContent='星期几'; l2.textContent='截止时间';
  } else if (v==='每月') {
    l1.textContent='开始日'; l2.textContent='截止日';
  } else if (v==='每季度') {
    l1.textContent='开始(提前天)'; l2.textContent='截止';
  }
}

function addSubtask() {
  const d = document.createElement('div');
  d.className = 'subtask-inline';
  d.innerHTML = '<input class="form-input" placeholder="名称" style="flex:1;font-size:10px;"><select class="form-select" style="width:66px;font-size:10px;"><option>自己</option><option>张三</option><option>李四</option><option>王五</option></select><span class="subtask-remove" onclick="this.parentElement.remove()">✕</span>';
  document.getElementById('subtaskList').appendChild(d);
}

function addTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) return;
  const q = document.getElementById('quadrant').value;
  const section = document.getElementById(q + 'section');
  section.classList.remove('quad-collapsed');
  const tasks = section.querySelector('.quad-tasks');
  const item = document.createElement('div');
  item.className = 'task-item';
  item.innerHTML = '<div class="task-check" onclick="this.classList.toggle(\'checked\');this.parentElement.classList.toggle(\'done\')"></div><span class="task-title">'+title+'</span><span class="task-tag tag-new">新</span>';
  tasks.appendChild(item);
  const cnt = section.querySelector('.quad-count');
  cnt.textContent = (parseInt(cnt.textContent)||0) + 1;
  toggleForm();
}

setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}, 30000);
</script>
</body>
</html>
