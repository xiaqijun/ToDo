<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TodoFlow 模拟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0d1117; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: #c9d1d9; user-select: none;
  }
  .desktop {
    width: 100%; max-width: 900px; aspect-ratio: 16/10;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-radius: 16px; position: relative; overflow: hidden;
    box-shadow: 0 0 0 1px #30363d;
  }
  .taskbar { position: absolute; bottom: 0; left: 0; right: 0; height: 36px; background: rgba(22,27,34,0.9); backdrop-filter: blur(12px); border-top: 1px solid #30363d; display: flex; align-items: center; padding: 0 12px; }
  .taskbar-time { margin-left: auto; font-size: 11px; color: #8b949e; }
  .tray { position: absolute; bottom: 40px; right: 10px; display: flex; gap: 6px; }
  .tray-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; opacity: 0.7; }
  .tray-icon:hover { opacity: 1; }

  .float-win { position: absolute; top: 8px; right: 8px; width: 310px; max-height: calc(100% - 52px); background: #161b22; border: 1px solid #30363d; border-radius: 10px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; z-index: 100; font-size: 12px; }
  .win-header { padding: 8px 10px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #21262d; flex-shrink: 0; }
  .win-title { font-weight: 600; font-size: 12px; flex: 1; }
  .win-pin { cursor: pointer; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #21262d; border: 1px solid #30363d; color: #8b949e; line-height: 1; }
  .win-pin:hover { color: #f0f6fc; }
  .win-tabs { display: flex; gap: 1px; background: #21262d; border-radius: 4px; padding: 1px; }
  .win-tab { padding: 3px 8px; border-radius: 3px; font-size: 10px; cursor: pointer; color: #8b949e; border: none; background: none; white-space: nowrap; }
  .win-tab.active { background: #30363d; color: #f0f6fc; }
  .win-body { flex: 1; overflow-y: auto; padding: 4px 8px 2px; min-height: 0; }

  .quad-section { margin-bottom: 0; }
  .quad-header { display: flex; align-items: center; gap: 5px; padding: 6px 4px; font-size: 10px; font-weight: 600; cursor: pointer; position: sticky; top: 0; background: #161b22; z-index: 2; border-radius: 4px; }
  .quad-header:hover { background: #1c2128; }
  .quad-dot { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; }
  .quad-count { margin-left: auto; font-size: 9px; color: #8b949e; }
  .quad-arrow { font-size: 8px; color: #484f58; transition: transform .15s; display: inline-block; width: 10px; text-align: center; }
  .quad-collapsed .quad-tasks { display: none; }
  .quad-collapsed .quad-arrow { transform: rotate(-90deg); }

  .task-item { display: flex; align-items: center; gap: 5px; padding: 4px 6px; border-radius: 5px; margin-bottom: 1px; font-size: 11px; }
  .task-item:hover { background: #1c2128; }
  .task-item.done { opacity: 0.45; }
  .task-item.done .task-title { text-decoration: line-through; color: #484f58; }
  .task-check { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #30363d; flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 8px; }
  .task-check:hover { border-color: #58a6ff; }
  .task-check.checked { background: #238636; border-color: #238636; color: #fff; }
  .task-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task-tag { font-size: 8px; padding: 1px 5px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; line-height: 1.4; }
  .tag-recur { background: rgba(203,166,247,0.15); color: #cba6f7; }
  .tag-assign { background: rgba(88,166,255,0.12); color: #58a6ff; }
  .tag-new { background: rgba(248,81,73,0.15); color: #f85149; }
  .subtasks { margin-left: 14px; }

  /* Add bar */
  .win-addbar { padding: 4px 8px 8px; border-top: 1px solid #21262d; flex-shrink: 0; }
  .add-row { display: flex; gap: 4px; }
  .add-input { flex: 1; background: #21262d; border: 1px solid #30363d; padding: 6px 10px; border-radius: 6px; color: #c9d1d9; font-size: 11px; outline: none; }
  .add-input:focus { border-color: #58a6ff; }
  .add-input::placeholder { color: #484f58; }
  .add-btn { padding: 6px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; border: none; font-weight: 500; background: #238636; color: #fff; white-space: nowrap; }
  .add-btn:hover { background: #2ea043; }

  /* Compact form */
  .add-form { display: none; margin-top: 6px; background: #1c2128; border: 1px solid #30363d; border-radius: 8px; padding: 8px 10px; }
  .add-form.open { display: block; }
  .form-row { display: flex; gap: 4px; margin-bottom: 4px; align-items: flex-end; }
  .form-grp { display: flex; flex-direction: column; gap: 2px; }
  .form-grp.grow { flex: 1; }
  .form-grp.sm { flex: 0 0 72px; }
  .form-grp.xs { flex: 0 0 58px; }
  .form-lbl { font-size: 9px; color: #8b949e; text-transform: uppercase; }
  .form-inp, .form-sel {
    background: #21262d; border: 1px solid #30363d;
    padding: 5px 6px; border-radius: 5px; color: #c9d1d9;
    font-size: 10px; outline: none; width: 100%;
  }
  .form-inp:focus, .form-sel:focus { border-color: #58a6ff; }
  .form-sel { cursor: pointer; }
  .recur-mini { font-size: 9px; color: #8b949e; padding: 2px 0 0; }
  .recur-mini input { width: 40px; text-align: center; }
  .btn-row { display: flex; gap: 4px; justify-content: flex-end; margin-top: 6px; }
  .btn { padding: 5px 12px; border-radius: 5px; font-size: 10px; cursor: pointer; border: none; }
  .btn-c { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
  .btn-c:hover { background: #30363d; }
  .btn-p { background: #238636; color: #fff; }
  .btn-p:hover { background: #2ea043; }

  .sub-inline { display: flex; align-items: center; gap: 4px; margin: 2px 0; }
  .sub-rm { color: #484f58; cursor: pointer; font-size: 11px; }
  .sub-rm:hover { color: #f85149; }
</style>
</head>
<body>
<div class="desktop">
  <div class="tray"><div class="tray-icon">📋</div></div>

  <div class="float-win" id="floatWin">
    <div class="win-header">
      <span class="win-title">📋 TodoFlow</span>
      <div class="win-tabs">
        <button class="win-tab active" onclick="switchTab(this)">我的</button>
        <button class="win-tab" onclick="switchTab(this)">💻开发组</button>
      </div>
      <span class="win-pin">📌</span>
    </div>

    <div class="win-body">
      <div class="quad-section" id="q1section">
        <div class="quad-header" onclick="toggleQuad(this)"><span class="quad-arrow">▼</span><span class="quad-dot" style="background:#f85149;"></span><span style="color:#f85149;">马上做</span><span class="quad-count">2</span></div>
        <div class="quad-tasks">
          <div class="task-item"><div class="task-check" onclick="this.classList.toggle('checked');this.parentElement.classList.toggle('done')"></div><span class="task-title">🔄 巡检</span><span class="task-tag tag-recur">每小时</span></div>
          <div class="task-item"><div class="task-check" onclick="this.classList.toggle('checked');this.parentElement.classList.toggle('done')"></div><span class="task-title">🔥 紧急排查故障</span><span class="task-tag tag-new">新</span></div>
        </div>
      </div>

      <div class="quad-section" id="q2section">
        <div class="quad-header" onclick="toggleQuad(this)"><span class="quad-arrow">▼</span><span class="quad-dot" style="background:#d29922;"></span><span style="color:#d29922;">计划做</span><span class="quad-count">3</span></div>
        <div class="quad-tasks">
          <div class="task-item"><div class="task-check"></div><span class="task-title">📝 周报</span><span class="task-tag tag-recur">每周一</span></div>
          <div class="task-item"><div class="task-check"></div><span class="task-title">📄 日报</span><span class="task-tag tag-recur">18:00后</span></div>
          <div class="task-item"><div class="task-check"></div><span class="task-title">🛡 暴露面梳理</span><span class="task-tag tag-recur">每季</span></div>
          <div class="subtasks">
            <div class="task-item"><div class="task-check"></div><span class="task-title">收集资产清单</span><span class="task-tag tag-assign">@张三</span></div>
            <div class="task-item"><div class="task-check checked"></div><span class="task-title" style="text-decoration:line-through;color:#484f58;">扫描端口</span><span class="task-tag tag-assign">@李四</span></div>
            <div class="task-item"><div class="task-check"></div><span class="task-title">汇总报告</span><span class="task-tag tag-assign">@张三</span></div>
          </div>
        </div>
      </div>

      <div class="quad-section quad-collapsed" id="q3section">
        <div class="quad-header" onclick="toggleQuad(this)"><span class="quad-arrow">▼</span><span class="quad-dot" style="background:#58a6ff;"></span><span style="color:#58a6ff;">委派</span><span class="quad-count">1</span></div>
        <div class="quad-tasks"><div class="task-item"><div class="task-check"></div><span class="task-title">打印材料</span><span class="task-tag tag-assign">@王五</span></div></div>
      </div>

      <div class="quad-section quad-collapsed" id="q4section">
        <div class="quad-header" onclick="toggleQuad(this)"><span class="quad-arrow">▼</span><span class="quad-dot" style="background:#484f58;"></span><span style="color:#484f58;">暂缓</span><span class="quad-count">1</span></div>
        <div class="quad-tasks"><div class="task-item"><div class="task-check"></div><span class="task-title">整理文档</span></div></div>
      </div>
    </div>

    <div class="win-addbar">
      <div class="add-row">
        <input class="add-input" placeholder="+ 添加..." id="quickAdd">
        <button class="add-btn" onclick="toggleForm()">添加</button>
      </div>
      <div class="add-form" id="addForm">
        <!-- Row 1: Title -->
        <div class="form-row">
          <div class="form-grp grow">
            <label class="form-lbl">标题</label>
            <input class="form-inp" placeholder="任务名称" id="taskTitle">
          </div>
        </div>
        <!-- Row 2: Quadrant + Assignee + Recurrence (inline) -->
        <div class="form-row">
          <div class="form-grp sm">
            <label class="form-lbl">象限</label>
            <select class="form-sel" id="quadrant">
              <option value="q1">🔴 马上做</option>
              <option value="q2" selected>🟡 计划做</option>
              <option value="q3">🔵 委派</option>
              <option value="q4">⚫ 暂缓</option>
            </select>
          </div>
          <div class="form-grp sm">
            <label class="form-lbl">分配给</label>
            <select class="form-sel"><option>自己</option><option>张三</option><option>李四</option><option>王五</option></select>
          </div>
          <div class="form-grp sm">
            <label class="form-lbl">循环</label>
            <select class="form-sel" id="recurrence" onchange="updateRecurOpts()">
              <option>不循环</option><option>每小时</option><option>每天</option><option>每周</option><option>每月</option><option>每季度</option>
            </select>
          </div>
        </div>
        <!-- Row 3: Start + Due time -->
        <div class="form-row">
          <div class="form-grp grow">
            <label class="form-lbl">开始时间</label>
            <input class="form-inp" type="datetime-local" value="2026-06-17T09:00" id="startTime">
          </div>
          <div class="form-grp grow">
            <label class="form-lbl">截止时间</label>
            <input class="form-inp" type="datetime-local" value="2026-06-17T18:00" id="dueTime">
          </div>
        </div>
        <!-- Row 4 (only for recurring): compact recur param -->
        <div class="recur-mini" id="recurMini" style="display:none;">
          <span id="recurPrefix">间隔</span> <input class="form-inp" type="number" value="1" min="1" id="recurParamVal"> <span id="recurUnit">小时</span>
          <label id="weekdayOnly" style="display:none;margin-left:8px;font-size:10px;color:#8b949e;cursor:pointer;"><input type="checkbox" checked style="accent-color:#58a6ff;width:12px;height:12px;vertical-align:middle;margin-right:3px;">仅工作日</label>
        </div>
        <!-- Subtasks -->
        <div style="margin-top:2px;">
          <label class="form-lbl">子任务</label>
          <div id="subtaskList">
            <div class="sub-inline"><input class="form-inp" placeholder="名称" style="flex:1;"><select class="form-sel" style="width:66px;"><option>自己</option><option>张三</option><option>李四</option><option>王五</option></select><span class="sub-rm" onclick="this.parentElement.remove()">✕</span></div>
          </div>
          <span style="font-size:9px;color:#58a6ff;cursor:pointer;display:inline-block;" onclick="addSub()">+ 子任务</span>
        </div>
        <div class="btn-row">
          <button class="btn btn-c" onclick="toggleForm()">取消</button>
          <button class="btn btn-p" onclick="addTask()">添加</button>
        </div>
      </div>
    </div>
  </div>

  <div class="taskbar"><span class="taskbar-time" id="clock">15:42</span></div>
</div>

<script>
function toggleQuad(h){h.closest('.quad-section').classList.toggle('quad-collapsed')}
function switchTab(el){document.querySelectorAll('.win-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active')}
function toggleForm(){
  const f=document.getElementById('addForm');
  f.classList.toggle('open');
  if(!f.classList.contains('open')){document.getElementById('quickAdd').value='';document.getElementById('taskTitle').value=''}
  if(f.classList.contains('open'))document.getElementById('taskTitle').focus();
}

function updateRecurOpts(){
  const v=document.getElementById('recurrence').value;
  const m=document.getElementById('recurMini');
  const p=document.getElementById('recurPrefix');
  const u=document.getElementById('recurUnit');
  const inp=document.getElementById('recurParamVal');
  const wd=document.getElementById('weekdayOnly');
  if(v==='不循环'){m.style.display='none';return;}
  m.style.display='block';
  inp.style.width='40px';
  if(v==='每小时'){
    p.textContent='间隔'; u.textContent='小时'; inp.type='number'; inp.value='1'; inp.min='1'; inp.style.display='';
    wd.style.display='inline';
  } else if(v==='每天'){
    p.style.display='none'; inp.style.display='none'; u.style.display='none';
    wd.style.display='inline';
  } else if(v==='每周'){
    p.textContent='星期'; u.textContent=''; inp.type='text'; inp.value='一,三,五'; inp.style.width='70px'; inp.style.display='';
    p.style.display=''; u.style.display='';
    wd.style.display='none';
  } else if(v==='每月'){
    p.textContent='每'; u.textContent='号'; inp.type='number'; inp.value='1'; inp.min='1'; inp.max='31'; inp.style.display='';
    p.style.display=''; u.style.display='';
    wd.style.display='none';
  } else if(v==='每季度'){
    p.textContent='提前'; u.textContent='天'; inp.type='number'; inp.value='7'; inp.min='1'; inp.style.display='';
    p.style.display=''; u.style.display='';
    wd.style.display='none';
  }
}

function addSub(){
  const d=document.createElement('div');
  d.className='sub-inline';
  d.innerHTML='<input class="form-inp" placeholder="名称" style="flex:1;"><select class="form-sel" style="width:66px;"><option>自己</option><option>张三</option><option>李四</option><option>王五</option></select><span class="sub-rm" onclick="this.parentElement.remove()">✕</span>';
  document.getElementById('subtaskList').appendChild(d);
}

function addTask(){
  const t=document.getElementById('taskTitle').value.trim();if(!t)return;
  const q=document.getElementById('quadrant').value;
  const s=document.getElementById(q+'section');s.classList.remove('quad-collapsed');
  const el=document.createElement('div');el.className='task-item';
  el.innerHTML='<div class="task-check" onclick="this.classList.toggle(\'checked\');this.parentElement.classList.toggle(\'done\')"></div><span class="task-title">'+t+'</span><span class="task-tag tag-new">新</span>';
  s.querySelector('.quad-tasks').appendChild(el);
  const cn=s.querySelector('.quad-count');cn.textContent=(parseInt(cn.textContent)||0)+1;
  toggleForm();
}
setInterval(()=>{const n=new Date();document.getElementById('clock').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0')},30000);
</script>
</body>
</html>
