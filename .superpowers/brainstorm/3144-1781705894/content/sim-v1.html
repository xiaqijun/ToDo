<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TodoFlow 模拟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: #c9d1d9;
    user-select: none;
  }

  /* Desktop background */
  .desktop {
    width: 100%; max-width: 900px;
    aspect-ratio: 16/10;
    background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 1px #30363d;
  }

  /* Taskbar */
  .taskbar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 40px;
    background: rgba(22, 27, 34, 0.9);
    backdrop-filter: blur(12px);
    border-top: 1px solid #30363d;
    display: flex; align-items: center; padding: 0 12px;
    border-radius: 0 0 16px 16px;
  }
  .taskbar-time {
    margin-left: auto;
    font-size: 12px; color: #8b949e;
  }

  /* System tray area */
  .tray {
    position: absolute; bottom: 44px; right: 12px;
    display: flex; align-items: flex-end; gap: 8px;
  }
  .tray-icon {
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; cursor: pointer;
    opacity: 0.7; transition: opacity .15s;
  }
  .tray-icon:hover { opacity: 1; }

  /* Floating window */
  .float-win {
    position: absolute;
    bottom: 68px; right: 16px;
    width: 370px;
    max-height: 540px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6);
    display: none;
    flex-direction: column;
    overflow: hidden;
    animation: slideUp .2s ease-out;
    z-index: 100;
  }
  .float-win.open { display: flex; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Window header */
  .win-header {
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #21262d;
    flex-shrink: 0;
  }
  .win-title { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
  .win-tabs { display: flex; gap: 2px; background: #21262d; border-radius: 6px; padding: 2px; }
  .win-tab {
    padding: 4px 12px; border-radius: 4px; font-size: 11px;
    cursor: pointer; color: #8b949e; transition: all .15s;
    border: none; background: none;
  }
  .win-tab.active { background: #30363d; color: #f0f6fc; }

  /* Window body */
  .win-body { flex: 1; overflow-y: auto; padding: 8px 16px; min-height: 0; }

  /* Quadrant section */
  .quad-section { margin-bottom: 2px; }
  .quad-header {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 0 6px;
    font-size: 11px; font-weight: 600;
    cursor: pointer;
    position: sticky; top: 0; background: #161b22; z-index: 2;
  }
  .quad-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .quad-count {
    margin-left: auto;
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
    color: #8b949e;
  }

  /* Task item */
  .task-item {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 10px; border-radius: 8px;
    margin-bottom: 3px;
    transition: background .15s;
    position: relative;
  }
  .task-item:hover { background: #1c2128; }
  .task-item.done .task-title { text-decoration: line-through; color: #484f58; }
  .task-check {
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid #30363d; flex-shrink: 0;
    cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
  }
  .task-check:hover { border-color: #58a6ff; }
  .task-check.checked { background: #238636; border-color: #238636; color: #fff; }
  .task-title { flex: 1; font-size: 13px; line-height: 1.4; }
  .task-meta { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .task-tag {
    font-size: 10px; padding: 2px 6px; border-radius: 10px;
    white-space: nowrap;
  }
  .tag-recur { background: rgba(203,166,247,0.15); color: #cba6f7; }
  .tag-assign { background: rgba(88,166,255,0.15); color: #58a6ff; }
  .tag-new { background: rgba(248,81,73,0.15); color: #f85149; }
  .tag-time { color: #8b949e; font-size: 10px; white-space: nowrap; }

  .subtasks { margin-left: 24px; }

  /* Quick add bar */
  .win-addbar {
    padding: 8px 16px 12px;
    border-top: 1px solid #21262d;
    flex-shrink: 0;
  }
  .add-input {
    width: 100%; background: #21262d; border: 1px solid #30363d;
    padding: 10px 14px; border-radius: 8px; color: #c9d1d9;
    font-size: 12px; outline: none; transition: border-color .15s;
  }
  .add-input:focus { border-color: #58a6ff; }
  .add-input::placeholder { color: #484f58; }

  /* Add form (expanded) */
  .add-form {
    display: none;
    background: #1c2128; border: 1px solid #30363d;
    border-radius: 10px; padding: 14px; margin-top: 8px;
    animation: slideUp .15s ease-out;
  }
  .add-form.open { display: block; }
  .form-row {
    display: flex; gap: 8px; margin-bottom: 8px;
  }
  .form-field {
    flex: 1; display: flex; flex-direction: column; gap: 4px;
  }
  .form-label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; }
  .form-input, .form-select {
    background: #21262d; border: 1px solid #30363d;
    padding: 7px 10px; border-radius: 6px; color: #c9d1d9;
    font-size: 12px; outline: none; width: 100%;
  }
  .form-input:focus, .form-select:focus { border-color: #58a6ff; }
  .form-select { cursor: pointer; }
  .form-actions {
    display: flex; gap: 6px; justify-content: flex-end; margin-top: 10px;
  }
  .btn {
    padding: 7px 16px; border-radius: 6px; font-size: 12px;
    cursor: pointer; border: none; transition: all .15s;
    font-weight: 500;
  }
  .btn-cancel { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
  .btn-cancel:hover { background: #30363d; }
  .btn-primary { background: #238636; color: #fff; }
  .btn-primary:hover { background: #2ea043; }

  /* Subtask mini */
  .subtask-inline {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 0; margin: 2px 0;
  }
  .subtask-remove {
    color: #484f58; cursor: pointer; font-size: 14px;
  }
  .subtask-remove:hover { color: #f85149; }

  /* Tooltip hint */
  .hint-bar {
    text-align: center; font-size: 11px; color: #484f58;
    padding: 8px 0;
  }
</style>
</head>
<body>
<div class="desktop" id="desktop">
  <!-- Tray area -->
  <div class="tray">
    <div class="tray-icon" title="TodoFlow" onclick="toggleFloat()">📋</div>
  </div>

  <!-- Floating window -->
  <div class="float-win open" id="floatWin">
    <!-- Header -->
    <div class="win-header">
      <div class="win-title">📋 TodoFlow</div>
      <div class="win-tabs">
        <button class="win-tab active" onclick="switchTab('my', this)">我的</button>
        <button class="win-tab" onclick="switchTab('team', this)">💻 开发组</button>
      </div>
      <span style="font-size:18px;cursor:pointer;color:#484f58;" onclick="toggleFloat()">✕</span>
    </div>

    <!-- Body -->
    <div class="win-body" id="winBody">
      <!-- Q1: 紧急 + 重要 -->
      <div class="quad-section">
        <div class="quad-header" onclick="toggleQuad(this)">
          <span class="quad-dot" style="background:#f85149;"></span>
          <span style="color:#f85149;">紧急且重要</span>
          <span class="quad-count" style="background:rgba(248,81,73,0.15);color:#f85149;">2</span>
        </div>
        <div class="quad-tasks" id="q1">
          <div class="task-item" draggable="true">
            <div class="task-check" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
            <span class="task-title">🔄 巡检</span>
            <span class="task-meta">
              <span class="task-tag tag-recur">每小时</span>
              <span class="task-tag tag-time">下次 15:00</span>
            </span>
          </div>
          <div class="task-item" draggable="true">
            <div class="task-check" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
            <span class="task-title">🔥 紧急排查登录故障</span>
            <span class="task-meta">
              <span class="task-tag tag-new">新插入</span>
              <span class="task-tag tag-time">尽快</span>
            </span>
          </div>
        </div>
      </div>

      <!-- Q2: 不紧急 + 重要 -->
      <div class="quad-section">
        <div class="quad-header" onclick="toggleQuad(this)">
          <span class="quad-dot" style="background:#d29922;"></span>
          <span style="color:#d29922;">重要不紧急</span>
          <span class="quad-count" style="background:rgba(210,153,34,0.15);color:#d29922;">3</span>
        </div>
        <div class="quad-tasks" id="q2">
          <div class="task-item" draggable="true">
            <div class="task-check" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
            <span class="task-title">📝 周报</span>
            <span class="task-meta">
              <span class="task-tag tag-recur">每周一</span>
              <span class="task-tag tag-time">上午12:00</span>
            </span>
          </div>
          <div class="task-item" draggable="true">
            <div class="task-check" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
            <span class="task-title">📄 日报</span>
            <span class="task-meta">
              <span class="task-tag tag-recur">每天 · 18:00后</span>
              <span class="task-tag tag-time">23:59前</span>
            </span>
          </div>
          <div class="task-item" draggable="true">
            <div class="task-check" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
            <span class="task-title">🛡 暴露面梳理</span>
            <span class="task-meta">
              <span class="task-tag tag-recur">每季度 · 提前7天</span>
            </span>
          </div>
          <!-- Subtasks -->
          <div class="subtasks">
            <div class="task-item" draggable="true">
              <div class="task-check" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
              <span class="task-title">收集资产清单</span>
              <span class="task-meta"><span class="task-tag tag-assign">@张三</span></span>
            </div>
            <div class="task-item" draggable="true">
              <div class="task-check checked" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
              <span class="task-title" style="text-decoration:line-through;color:#484f58;">扫描端口</span>
              <span class="task-meta"><span class="task-tag tag-assign">@李四</span></span>
            </div>
            <div class="task-item" draggable="true">
              <div class="task-check" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
              <span class="task-title">汇总报告</span>
              <span class="task-meta"><span class="task-tag tag-assign">@张三</span></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Q3: 紧急 + 不重要 -->
      <div class="quad-section">
        <div class="quad-header" onclick="toggleQuad(this)">
          <span class="quad-dot" style="background:#58a6ff;"></span>
          <span style="color:#58a6ff;">紧急不重要</span>
          <span class="quad-count">1</span>
        </div>
        <div class="quad-tasks" id="q3">
          <div class="task-item" draggable="true">
            <div class="task-check" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
            <span class="task-title">打印会议材料</span>
            <span class="task-meta">
              <span class="task-tag tag-assign">@王五</span>
              <span class="task-tag tag-time">今天16:00</span>
            </span>
          </div>
        </div>
      </div>

      <!-- Q4: 不紧急 + 不重要 -->
      <div class="quad-section">
        <div class="quad-header" onclick="toggleQuad(this)">
          <span class="quad-dot" style="background:#484f58;"></span>
          <span style="color:#484f58;">不紧急不重要</span>
          <span class="quad-count">1</span>
        </div>
        <div class="quad-tasks" id="q4">
          <div class="task-item" draggable="true">
            <div class="task-check" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
            <span class="task-title">整理旧文档</span>
          </div>
        </div>
      </div>

      <div class="hint-bar">← 点击任务完成 | 点击 + 添加新任务</div>
    </div>

    <!-- Add bar -->
    <div class="win-addbar">
      <input class="add-input" placeholder="+ 快速添加任务..." id="quickAdd" onfocus="showForm()">
      <div class="add-form" id="addForm">
        <div class="form-row">
          <div class="form-field" style="flex:2;">
            <label class="form-label">任务标题</label>
            <input class="form-input" placeholder="输入任务名称" id="taskTitle">
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">四象限</label>
            <select class="form-select" id="quadrant" onchange="updateSubtaskSection()">
              <option value="q1">🔴 紧急+重要 · 马上做</option>
              <option value="q2" selected>🟡 重要不紧急 · 计划做</option>
              <option value="q3">🔵 紧急不重要 · 委派</option>
              <option value="q4">⚫ 不紧急不重要 · 暂缓</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">分配给</label>
            <select class="form-select">
              <option>自己</option>
              <option>张三</option>
              <option>李四</option>
              <option>王五</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">截止时间</label>
            <input class="form-input" type="datetime-local" value="2026-06-17T18:00">
          </div>
          <div class="form-field">
            <label class="form-label">循环</label>
            <select class="form-select" id="recurrence" onchange="updateRecurrenceOptions()">
              <option>不循环</option>
              <option>每小时</option>
              <option>每天</option>
              <option>每周</option>
              <option>每月</option>
              <option>每季度</option>
            </select>
          </div>
        </div>
        <!-- Recurrence options (dynamic) -->
        <div class="form-row" id="recurExtra" style="display:none;">
          <div class="form-field">
            <label class="form-label" id="recurLabel1">显示时间</label>
            <input class="form-input" type="time" value="09:00">
          </div>
          <div class="form-field">
            <label class="form-label" id="recurLabel2">截止时刻</label>
            <input class="form-input" type="time" value="18:00">
          </div>
        </div>
        <!-- Subtask section -->
        <div id="subtaskSection" style="margin-top:4px;">
          <label class="form-label" style="margin-bottom:4px;display:block;">子任务</label>
          <div id="subtaskList">
            <div class="subtask-inline">
              <input class="form-input" placeholder="子任务名称" style="flex:1;font-size:11px;">
              <select class="form-select" style="width:80px;font-size:11px;">
                <option>自己</option><option>张三</option><option>李四</option><option>王五</option>
              </select>
              <span class="subtask-remove" onclick="this.parentElement.remove()">✕</span>
            </div>
          </div>
          <button class="btn btn-cancel" style="margin-top:6px;font-size:10px;padding:4px 10px;" onclick="addSubtaskRow()">+ 添加子任务</button>
        </div>
        <div class="form-actions">
          <button class="btn btn-cancel" onclick="hideForm()">取消</button>
          <button class="btn btn-primary" onclick="addTask()">添加任务</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Taskbar -->
  <div class="taskbar">
    <span class="taskbar-time" id="clock">15:42</span>
  </div>
</div>

<script>
  function toggleFloat() {
    document.getElementById('floatWin').classList.toggle('open');
  }

  function switchTab(tab, el) {
    document.querySelectorAll('.win-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  function toggleQuad(header) {
    const tasks = header.nextElementSibling;
    if (tasks) tasks.style.display = tasks.style.display === 'none' ? '' : 'none';
  }

  function showForm() {
    document.getElementById('addForm').classList.add('open');
  }
  function hideForm() {
    document.getElementById('addForm').classList.remove('open');
    document.getElementById('quickAdd').value = '';
    document.getElementById('taskTitle').value = '';
    document.getElementById('recurrence').value = '不循环';
    document.getElementById('recurExtra').style.display = 'none';
  }

  function updateRecurrenceOptions() {
    const val = document.getElementById('recurrence').value;
    const extra = document.getElementById('recurExtra');
    const l1 = document.getElementById('recurLabel1');
    const l2 = document.getElementById('recurLabel2');

    if (val === '不循环') {
      extra.style.display = 'none';
    } else if (val === '每小时') {
      extra.style.display = '';
      l1.textContent = '间隔 (小时)';
      l2.textContent = '开始时间';
    } else if (val === '每天') {
      extra.style.display = '';
      l1.textContent = '显示时间 (之后)';
      l2.textContent = '截止时刻';
    } else if (val === '每周') {
      extra.style.display = '';
      l1.textContent = '星期几';
      l2.textContent = '截止时刻';
    } else if (val === '每月') {
      extra.style.display = '';
      l1.textContent = '几号';
      l2.textContent = '截止时刻';
    } else if (val === '每季度') {
      extra.style.display = '';
      l1.textContent = '提前天数';
      l2.textContent = '截止 (quarter_end)';
    }
  }

  function addSubtaskRow() {
    const div = document.createElement('div');
    div.className = 'subtask-inline';
    div.innerHTML = `
      <input class="form-input" placeholder="子任务名称" style="flex:1;font-size:11px;">
      <select class="form-select" style="width:80px;font-size:11px;">
        <option>自己</option><option>张三</option><option>李四</option><option>王五</option>
      </select>
      <span class="subtask-remove" onclick="this.parentElement.remove()">✕</span>
    `;
    document.getElementById('subtaskList').appendChild(div);
  }

  function updateSubtaskSection() {
    // Could hide subtask section for Q3/Q4 if desired
  }

  function addTask() {
    const title = document.getElementById('taskTitle').value.trim();
    if (!title) return;

    const quadrant = document.getElementById('quadrant').value;
    const qTasks = document.getElementById(quadrant);
    if (!qTasks) return;

    const item = document.createElement('div');
    item.className = 'task-item';
    item.draggable = true;
    item.innerHTML = `
      <div class="task-check" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('done')"></div>
      <span class="task-title">${title}</span>
      <span class="task-meta">
        <span class="task-tag tag-new">新</span>
      </span>
    `;
    qTasks.appendChild(item);

    // Update count
    const section = qTasks.closest('.quad-section');
    const countEl = section.querySelector('.quad-count');
    const current = parseInt(countEl.textContent) || 0;
    countEl.textContent = current + 1;

    hideForm();
  }

  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.getHours().toString().padStart(2,'0') + ':' +
      now.getMinutes().toString().padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 30000);
</script>
</body>
</html>
