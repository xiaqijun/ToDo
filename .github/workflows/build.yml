name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # 服务端
  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - run: cd server && npm ci && npx tsc --noEmit
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/todoflow-server:latest

  # 客户端类型检查（仅 push master）
  typecheck:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: cd client && npm ci && npx tsc --noEmit

  # 构建客户端安装包（仅 tag）
  package:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ${{ matrix.os }}
    needs: server
    strategy:
      matrix:
        include:
          - os: ubuntu-latest  target: linux
          - os: windows-latest target: win
          - os: macos-latest   target: mac
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libsecret-1-0 libasound2t64 2>/dev/null || \
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libsecret-1-0 libasound2

      - name: Build
        run: |
          cd client
          npm ci
          npm run build
          npx tsc --outDir dist-electron
          npx electron-builder --${{ matrix.target }} --publish=never

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TodoFlow-${{ matrix.target }}
          path: server/downloads/

  # 创建 Release（仅 tag）
  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }

      - uses: softprops/action-gh-release@v2
        with:
          name: TodoFlow ${{ github.ref_name }}
          files: dist/**/*
          generate_release_notes: true
