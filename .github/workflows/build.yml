name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - run: cd server && npm ci && npx tsc --noEmit
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/todoflow-server:latest

  typecheck:
    if: startsWith(github.ref, 'refs/heads/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd client && npm ci && npx tsc --noEmit

  package:
    if: startsWith(github.ref, 'refs/tags/')
    needs: server
    strategy:
      matrix:
        target: [linux, win, mac]
        include:
          - target: linux
            os: ubuntu-latest
          - target: win
            os: windows-latest
          - target: mac
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libsecret-1-0 libasound2t64

      - name: Build Electron
        env:
          DEBUG: electron-builder
        run: |
          cd client
          echo "=== npm ci ===" && npm ci
          echo "=== vite build ===" && npm run build
          echo "=== tsc electron ===" && npx tsc --outDir dist-electron
          echo "=== dist-electron contents ===" && find dist-electron -type f
          echo "=== electron-builder ===" && npx electron-builder --${{ matrix.target }} --publish=never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoFlow-${{ matrix.target }}
          path: server/downloads/

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          name: TodoFlow ${{ github.ref_name }}
          files: dist/**/*
          generate_release_notes: true
