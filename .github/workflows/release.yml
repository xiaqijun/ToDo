name: Release

on:
  push:
    tags: ['v*']

jobs:
  # 1. 构建服务端镜像
  server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/todoflow-server:${{ github.ref_name }}

  # 2. 构建客户端 — 全平台
  build:
    runs-on: ${{ matrix.os }}
    needs: server
    strategy:
      matrix:
        include:
          - os: ubuntu-latest  platform: linux   ext: .AppImage
          - os: windows-latest platform: win     ext: .exe
          - os: macos-latest   platform: mac     ext: .dmg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install Linux deps (electron-builder)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 \
            xdg-utils libatspi2.0-0 libsecret-1-0 libasound2t64 2>/dev/null || \
          sudo apt-get install -y libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 \
            xdg-utils libatspi2.0-0 libsecret-1-0 libasound2

      - name: Build client
        run: |
          cd client
          npm ci
          npm run build
          npx tsc --outDir dist-electron
          npx electron-builder --${{ matrix.platform }} --publish=never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TodoFlow-${{ matrix.platform }}
          path: server/downloads/*${{ matrix.ext }}

  # 3. 创建 Release
  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }

      - name: List artifacts
        run: find dist -type f

      - uses: softprops/action-gh-release@v2
        with:
          name: TodoFlow ${{ github.ref_name }}
          files: dist/**/*
          generate_release_notes: true
